name: Require Changeset

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/cli/**'
      - 'registry/**'

jobs:
  check:
    name: Check for pending changeset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # registry/** isn't a pnpm workspace package, so `changeset status` below
      # can't see changes to it (it only diffs known workspace package dirs).
      # This catches registry-only edits that changeset status would miss.
      - name: Verify a changeset was added
        run: |
          if ! find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "::error::This PR touches packages/cli/** or registry/**, but no changeset was found under .changeset/. Run 'pnpm changeset' (or 'pnpm changeset add --empty' if this change doesn't need a release)."
            exit 1
          fi
          echo "Pending changeset found."

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Catches the case where a changeset exists but doesn't actually cover
      # @sanring/cli for the packages/cli/** changes in this PR.
      - name: Verify the changeset covers what changed in packages/cli
        run: pnpm changeset status --since=origin/${{ github.base_ref }}
